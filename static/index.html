<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tender Analyser</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Tender Analyser</h1>
    <p class="lead">Upload PDF, DOCX, or a ZIP of documents. Requires <code>GEMINI_API_KEY</code> on the server.</p>

    <section class="card">
      <h2>Analyse</h2>
      <form id="form">
        <label class="file">
          <input type="file" id="files" name="files" multiple accept=".pdf,.docx,.zip,.txt,.html,.htm" required />
          <span>Choose files</span>
        </label>
        <label>Tender ID (optional, for updates)</label>
        <input type="text" id="tender_id" name="tender_id" placeholder="leave empty to create new" />
        <button type="submit" id="go">Run analysis</button>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>Result</h2>
      <pre id="out" class="out">—</pre>
    </section>
  </main>
  <script>
    const form = document.getElementById("form");
    const statusEl = document.getElementById("status");
    const out = document.getElementById("out");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData();
      const inp = document.getElementById("files");
      for (const f of inp.files) fd.append("files", f);
      const tid = document.getElementById("tender_id").value.trim();
      if (tid) fd.append("tender_id", tid);
      statusEl.textContent = "Analysing… this may take 1–3 minutes.";
      out.textContent = "—";
      try {
        const r = await fetch("/api/analyse", { method: "POST", body: fd });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.detail || r.statusText || "Request failed");
        statusEl.textContent = "Done. Tender ID: " + data.tender_id;
        out.textContent = JSON.stringify(data.analysis, null, 2);
      } catch (err) {
        statusEl.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
